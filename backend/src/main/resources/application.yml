spring:
  application:
    name: gestion-bodega-backend

  # ─── PostgreSQL ───
  # Variables sensibles via env vars (con defaults para desarrollo local)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gestion_bodega}
    username: ${DB_USER:bodega_user}
    password: ${DB_PASS:bodega_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ─── JPA / Hibernate ───
  jpa:
    hibernate:
      ddl-auto: validate          # NUNCA usar 'create' o 'update' — Flyway maneja el schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: America/Lima
    open-in-view: false

  # ─── Flyway (migraciones) ───
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ─── Jackson (JSON) ───
  jackson:
    time-zone: America/Lima
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: NON_NULL

# ─── Server ───
server:
  port: 8080
  servlet:
    context-path: /api

# ─── App config (JWT, Flyway extras, CORS) ───
app:
  jwt:
    # Variable de entorno obligatoria en produccion. Default solo para dev local.
    # Debe tener minimo 256 bits (32 chars).
    secret: ${JWT_SECRET:dev_secret_local_no_usar_en_produccion_minimo_32}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}      # 8 horas
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  # Flyway extras (la propiedad spring.flyway.repair-on-migrate NO existe en
  # Spring Boot Community, asi que se implementa en FlywayConfig.java).
  flyway:
    repair-on-startup: ${FLYWAY_REPAIR:true}

# ─── Swagger ───
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ─── Logging ───
logging:
  level:
    root: INFO
    com.thiago.gestionbodega: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
